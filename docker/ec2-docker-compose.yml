version: '3'

services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"

  api:
    build: ../services/api_service
    container_name: food-api
    ports:
      - "5001:5000"
    depends_on:
      - cassandra

  frontend:
    image: nginx:alpine
    container_name: food-frontend
    ports:
      - "80:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
    depends_on:
      - api

